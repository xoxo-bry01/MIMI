<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2D1124" />
      <stop offset="50%" stop-color="#4A1C36" />
      <stop offset="100%" stop-color="#1A0A15" />
    </linearGradient>

    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF7EB3" stop-opacity="0.1" />
      <stop offset="80%" stop-color="#FF7EB3" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#FF2E93" stop-opacity="0.8" />
    </linearGradient>

    <filter id="cozyGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#skyGrad)" />

  <g fill="#FFF0F5" opacity="0.6">
    <rect x="120" y="80" width="6" height="6" />
    <rect x="250" y="140" width="4" height="4" />
    <rect x="520" y="90" width="6" height="6" />
    <rect x="700" y="180" width="5" height="5" />
    <rect x="80" y="280" width="4" height="4" />
    <rect x="640" y="300" width="6" height="6" />
    <rect x="380" y="70" width="8" height="8" fill="#FFB7CE" filter="url(#cozyGlow)" />
    <rect x="180" y="220" width="6" height="6" fill="#FFB7CE" />
    <rect x="720" y="70" width="4" height="4" />
  </g>

  <g fill="#FFC0CB" filter="url(#cozyGlow)">
    <rect x="460" y="150" width="4" height="16" />
    <rect x="454" y="156" width="16" height="4" />
    <rect x="150" y="110" width="2" height="10" />
    <rect x="146" y="114" width="10" height="2" />
  </g>

  <ellipse cx="400" cy="420" rx="350" ry="80" fill="#FF7EB3" opacity="0.15" filter="url(#cozyGlow)" />

  <g stroke="url(#gridGrad)" stroke-width="3">
    <line x1="0" y1="420" x2="800" y2="420" stroke-width="4" />
    
    <line x1="400" y1="420" x2="-200" y2="600" />
    <line x1="400" y1="420" x2="0" y2="600" />
    <line x1="400" y1="420" x2="150" y2="600" />
    <line x1="400" y1="420" x2="300" y2="600" />
    <line x1="400" y1="420" x2="400" y2="600" />
    <line x1="400" y1="420" x2="500" y2="600" />
    <line x1="400" y1="420" x2="650" y2="600" />
    <line x1="400" y1="420" x2="800" y2="600" />
    <line x1="400" y1="420" x2="1000" y2="600" />

    <line x1="0" y1="435" x2="800" y2="435" />
    <line x1="0" y1="455" x2="800" y2="455" />
    <line x1="0" y1="480" x2="800" y2="480" />
    <line x1="0" y1="515" x2="800" y2="515" />
    <line x1="0" y1="555" x2="800" y2="555" />
    <line x1="0" y1="600" x2="800" y2="600" stroke-width="5" />
  </g>

  <circle cx="400" cy="260" r="220" fill="#000000" opacity="0.15" filter="url(#cozyGlow)" />
</svg>
