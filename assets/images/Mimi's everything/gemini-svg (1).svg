<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="pastelSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF0F2" />   <stop offset="50%" stop-color="#FFE3E8" />  <stop offset="100%" stop-color="#FFD1DC" /> </linearGradient>

    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#FFF5F6" stop-opacity="0.6" />
    </linearGradient>

    <filter id="magicGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#pastelSky)" />

  <g fill="#FFFFFF" opacity="0.4">
    <circle cx="40" cy="40" r="2" /><circle cx="140" cy="40" r="2" /><circle cx="240" cy="40" r="2" /><circle cx="340" cy="40" r="2" />
    <circle cx="440" cy="40" r="2" /><circle cx="540" cy="40" r="2" /><circle cx="640" cy="40" r="2" /><circle cx="740" cy="40" r="2" />
    <circle cx="90" cy="140" r="2" /><circle cx="190" cy="140" r="2" /><circle cx="290" cy="140" r="2" /><circle cx="390" cy="140" r="2" />
    <circle cx="490" cy="140" r="2" /><circle cx="590" cy="140" r="2" /><circle cx="690" cy="140" r="2" /><circle cx="790" cy="140" r="2" />
    <circle cx="40" cy="240" r="2" /><circle cx="140" cy="240" r="2" /><circle cx="240" cy="240" r="2" /><circle cx="340" cy="240" r="2" />
    <circle cx="440" cy="240" r="2" /><circle cx="540" cy="240" r="2" /><circle cx="640" cy="240" r="2" /><circle cx="740" cy="240" r="2" />
    <circle cx="90" cy="340" r="2" /><circle cx="190" cy="340" r="2" /><circle cx="290" cy="340" r="2" /><circle cx="390" cy="340" r="2" />
    <circle cx="490" cy="340" r="2" /><circle cx="590" cy="340" r="2" /><circle cx="690" cy="340" r="2" /><circle cx="790" cy="340" r="2" />
    <circle cx="40" cy="440" r="2" /><circle cx="140" cy="440" r="2" /><circle cx="240" cy="440" r="2" /><circle cx="340" cy="440" r="2" />
    <circle cx="440" cy="440" r="2" /><circle cx="540" cy="440" r="2" /><circle cx="640" cy="440" r="2" /><circle cx="740" cy="440" r="2" />
    <circle cx="90" cy="540" r="2" /><circle cx="190" cy="540" r="2" /><circle cx="290" cy="540" r="2" /><circle cx="390" cy="540" r="2" />
    <circle cx="490" cy="540" r="2" /><circle cx="590" cy="540" r="2" /><circle cx="690" cy="540" r="2" /><circle cx="790" cy="540" r="2" />
  </g>

  <g fill="url(#cloudGrad)">
    <circle cx="80" cy="560" r="90" />
    <circle cx="190" cy="590" r="70" />
    <circle cx="0" cy="500" r="80" />
    
    <circle cx="720" cy="560" r="90" />
    <circle cx="610" cy="590" r="70" />
    <circle cx="800" cy="490" r="80" />

    <circle cx="140" cy="100" r="35" opacity="0.7" />
    <circle cx="175" cy="110" r="25" opacity="0.7" />
    <circle cx="115" cy="115" r="20" opacity="0.7" />

    <circle cx="650" cy="80" r="40" opacity="0.7" />
    <circle cx="690" cy="90" r="30" opacity="0.7" />
    <circle cx="615" cy="95" r="25" opacity="0.7" />
  </g>

  <g fill="#FFF9E6" filter="url(#magicGlow)">
    <path d="M 540,160 Q 540,175 555,175 Q 540,175 540,190 Q 540,175 525,175 Q 540,175 540,160 Z" />
    <path d="M 220,320 Q 220,330 230,330 Q 220,330 220,340 Q 220,330 210,330 Q 220,330 220,320 Z" />
    <path d="M 400,480 Q 400,490 410,490 Q 400,490 400,500 Q 400,490 390,490 Q 400,490 400,480 Z" />
  </g>

  <g fill="#FFFFFF">
    <rect x="300" y="120" width="6" height="6" transform="rotate(45 303 123)" />
    <rect x="500" y="380" width="5" height="5" transform="rotate(45 502 382)" />
    <rect x="680" y="240" width="7" height="7" transform="rotate(45 683 243)" />
    <rect x="120" y="270" width="4" height="4" transform="rotate(45 122 272)" />
  </g>

  <g stroke="#FFA3B1" stroke-width="2" fill="none" opacity="0.6">
    <path d="M 340,200 C 335,190 315,190 315,205 C 315,220 340,235 340,240 C 340,235 365,220 365,205 C 365,190 345,190 340,200 Z" transform="scale(0.7) translate(180, 50)" />
    <path d="M 340,200 C 335,190 315,190 315,205 C 315,220 340,235 340,240 C 340,235 365,220 365,205 C 365,190 345,190 340,200 Z" transform="scale(0.5) translate(850, 400)" />
  </g>

</svg>
